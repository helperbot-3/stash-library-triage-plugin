name: Library Triage
description: Adds a largest-files triage page and auto-tags scenes from female performer rating/age signals.
version: 0.1.0
url: https://example.invalid/stash-library-triage-plugin

ui:
  javascript:
    - ui/triage-ui.js
    - ui/entities-ui.js
  css:
    - ui/triage-ui.css

interface: js
exec:
  - hooks/scene-triage-tags.js

tasks:
  - name: Recompute all triage data (recommended)
    description: Recomputes performer metrics, studio has-unrated tag, and all managed scene triage tags.
    defaultArgs:
      action: recount_all
  - name: Recompute performer metrics
    description: Recomputes performer metrics and studio has-unrated-scenes tag state.
    defaultArgs:
      action: recount_unrated_all
  - name: Backfill scene triage tags
    description: Recomputes managed triage tags for all scenes.
    defaultArgs:
      action: backfill_scene_tags

hooks:
  - name: Auto-tag scene from female performer signals
    description: Updates triage tags on scene create/update.
    defaultArgs:
      action: scene_tags
    triggeredBy:
      - Scene.Create.Post
      - Scene.Update.Post
      - Performer.Update.Post
  - name: Update performer metrics
    description: Updates performer metrics and studio has-unrated-scenes tag state.
    defaultArgs:
      action: update_unrated_counts
    triggeredBy:
      - Scene.Create.Post
      - Scene.Update.Post
      - Scene.Destroy.Post
      - Performer.Update.Post
  - name: Auto-tag performer rating
    description: Adds performer tag rated 1..5 from performer rating.
    defaultArgs:
      action: performer_rating_tags
    triggeredBy:
      - Performer.Create.Post
      - Performer.Update.Post
